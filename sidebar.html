<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日报数据获取</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>本周日报数据</h1>

    <div class="config-section">
      <button id="configBtn" class="btn small config-btn">⚙ 配置</button>
    </div>

    <div id="configPanel" class="config-panel hidden">
      <div class="config-header">
        <span>AI 服务配置</span>
        <button id="closeConfigBtn" class="btn small close-btn">关闭</button>
      </div>
      <div class="config-body">
        <div class="config-item">
          <label>API Base URL:</label>
          <input id="apiBaseUrl" type="text" class="config-input" placeholder="https://ai.gitee.com/v1">
        </div>
        <div class="config-item">
          <label>API Key:</label>
          <input id="apiKey" type="password" class="config-input" placeholder="请输入您的 API Key">
        </div>
        <div class="config-item">
          <label>模型名称:</label>
          <input id="modelName" type="text" class="config-input" placeholder="Qwen3-8B">
        </div>
        <button id="saveConfigBtn" class="btn primary save-config-btn">保存配置</button>
      </div>
    </div>

    <div id="status" class="status">
      准备就绪
    </div>

    <div id="weekRange" class="week-range"></div>

    <button id="fetchBtn" class="btn primary">获取本周数据</button>

    <div id="aiSummaryContainer" class="result-container hidden">
      <div class="result-header">
        <span>AI 工作总结</span>
        <button id="copyAiBtn" class="btn small">复制</button>
      </div>
      <div id="aiSummaryOutput" class="ai-summary-output"></div>
    </div>

    <div id="markdownContainer" class="result-container hidden collapsed">
      <div class="result-header clickable" id="markdownToggle">
        <span>Markdown 格式 ▶</span>
        <div class="btn-group">
          <button id="aiSummaryBtn" class="btn small">AI 总结</button>
          <button id="copyMdBtn" class="btn small">复制</button>
        </div>
      </div>
      <pre id="markdownOutput" class="markdown-output hidden"></pre>
    </div>

    <div id="resultContainer" class="result-container hidden collapsed">
      <div class="result-header clickable" id="jsonToggle">
        <span>JSON 数据 ▶</span>
        <button id="copyBtn" class="btn small">复制</button>
      </div>
      <pre id="jsonOutput" class="json-output hidden"></pre>
    </div>

    <div id="errorContainer" class="error-container hidden">
      <span id="errorMessage"></span>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
