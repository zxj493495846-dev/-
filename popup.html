<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打开侧边栏</title>
  <style>
    body {
      width: 0;
      height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    (async () => {
      try {
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        await chrome.sidePanel.open({ tabId: tab.id });
      } catch (error) {
        console.error('打开侧边栏失败:', error);
      }
      window.close();
    })();
  </script>
</body>
</html>
